<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge-to-Feast AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #4b5563;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 16px; 
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            box-sizing: border-box; 
        }

        .input-card { text-align: center; }
        h2 { margin-top: 0; color: #111827; font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .input-group input[type="text"] { flex: 2; }
        .input-group input[type="text"].qty-input { flex: 1; }

        input, textarea { 
            padding: 14px 16px; 
            border-radius: 12px; 
            border: 1px solid #e5e7eb; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #f3f4f6;
            font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background-color: #fff; }

        .btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .badge {
            background: #e5e7eb;
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge remove { color: #ef4444; cursor: pointer; font-weight: bold; }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: left;
            margin: 15px 0 8px 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pref-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .pref-tag {
            background: #f3f4f6;
            border: 2px solid transparent;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .pref-tag:hover { background: #e5e7eb; }

        .pref-tag.selected {
            background: #e6f4ea;
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        .custom-pref-box {
            display: none;
            width: 100%;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        .custom-pref-box input { width: 100%; }

        .btn-main { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
        } 
        .btn-main:hover { background: var(--primary-hover); }

        .btn-regen {
            width: 100%;
            padding: 14px;
            background: none;
            color: var(--secondary);
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-regen:hover { background: #f3f4f6; border-color: var(--secondary); color: #111827; }

        .feedback-group {
            display: none;
            margin-top: 16px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }
        .feedback-group textarea {
            width: 100%;
            height: 70px;
            resize: none;
            font-size: 14px;
            margin-top: 6px;
        }

        .recipe-card { display: none; animation: slideUp 0.4s ease-out forwards; }
        .recipe-content h3 { color: #111827; font-size: 20px; margin-top: 24px; margin-bottom: 8px; border-bottom: 2px solid #f3f4f6; padding-bottom: 6px; }
        .recipe-content p, .recipe-content li { line-height: 1.6; font-size: 15px; }
        .loading { color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0; }
        .error-text { color: #ef4444; font-weight: 600; text-align: center; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card input-card">
        <h2>🍳 Fridge-to-Feast</h2>
        <p class="subtitle">Add items and their quantities (e.g., 2 kg, 3 pcs, half bar):</p>
        
        <div class="input-group">
            <input type="text" id="ingredientName" placeholder="Ingredient (e.g. Eggs)">
            <input type="text" id="ingredientQty" class="qty-input" placeholder="Qty (e.g. 3 pcs)">
            <button class="btn-add" onclick="addIngredient()">Add</button>
        </div>

        <div id="ingredientsList" class="ingredients-list"></div>

        <div class="section-title">What are you craving? (Optional)</div>
        <div class="pref-container">
            <div class="pref-tag" onclick="selectPreference(this, 'Spicy')">🌶️ Spicy</div>
            <div class="pref-tag" onclick="selectPreference(this, 'Soup')">🥣 Soup</div>
            <div class="pref-tag" onclick="selectPreference(this, 'Sweet')">🍰 Sweet</div>
            <div class="pref-tag" onclick="selectPreference(this, 'Tangy/Sour')">🍋 Tangy</div>
            <div class="pref-tag" onclick="selectPreference(this, 'Healthy/Diet')">🥗 Healthy</div>
            <div class="pref-tag" onclick="selectPreference(this, 'Crispy/Fried')">🍗 Crispy</div>
            <div class="pref-tag" id="otherTag" onclick="selectPreference(this, 'Other')">✨ Other...</div>
        </div>

        <div id="customPrefBox" class="custom-pref-box">
            <input type="text" id="customPrefInput" placeholder="Describe your craving (e.g., Savory breakfast style)">
        </div>

        <button class="btn-main" onclick="generateRecipe(false)">Generate Recipe</button>
    </div>

    <div id="recipeCard" class="card recipe-card">
        <div id="output"></div>
        
        <button id="regenBtn" class="btn-regen" onclick="generateRecipe(true)">💡 Suggest a different recipe</button>
        
        <div id="feedbackGroup" class="feedback-group">
            <div class="section-title">Adjust Next Suggestion (Press Enter to send):</div>
            <textarea id="feedbackInput" onkeydown="handleFeedbackKey(event)" placeholder="e.g., I don't have any pepper, or make it simpler to cook..."></textarea>
        </div>
    </div>
</div>

<script>
    let basket = [];
    let selectedPreference = ""; 

    function addIngredient() {
        const nameInput = document.getElementById('ingredientName');
        const qtyInput = document.getElementById('ingredientQty');
        const name = nameInput.value.trim();
        const quantity = qtyInput.value.trim();

        if (!name) return alert("Please type an ingredient name!");
        basket.push({ name, quantity });
        
        nameInput.value = '';
        qtyInput.value = '';
        renderBadges();
    }

    function removeIngredient(index) {
        basket.splice(index, 1);
        renderBadges();
    }

    function renderBadges() {
        const listDiv = document.getElementById('ingredientsList');
        listDiv.innerHTML = basket.map((item, index) => `
            <div class="badge">
                <span>${item.quantity ? item.quantity + ' ' : ''}${item.name}</span>
                <remove onclick="removeIngredient(${index})">✕</remove>
            </div>
        `).join('');
    }

    function selectPreference(element, prefValue) {
        const tags = document.querySelectorAll('.pref-tag');
        const customPrefBox = document.getElementById('customPrefBox');
        const customPrefInput = document.getElementById('customPrefInput');
        
        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            selectedPreference = "";
            if(prefValue === 'Other') {
                customPrefBox.style.display = "none";
                customPrefInput.value = "";
            }
        } else {
            tags.forEach(t => t.classList.remove('selected'));
            element.classList.add('selected');
            selectedPreference = prefValue;

            if (prefValue === 'Other') {
                customPrefBox.style.display = "block";
                customPrefInput.focus();
            } else {
                customPrefBox.style.display = "none";
                customPrefInput.value = "";
            }
        }
    }

    // NEW: Captures enter key press within the adjustment textarea box
    function handleFeedbackKey(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault(); // Stop a fresh empty line block from forming
            generateRecipe(true);   // Automatically submit and regenerate!
        }
    }

    async function generateRecipe(isRegenerate = false) {
        const recipeCard = document.getElementById('recipeCard');
        const outputDiv = document.getElementById('output');
        const regenBtn = document.getElementById('regenBtn');
        const feedbackGroup = document.getElementById('feedbackGroup');
        const feedbackInput = document.getElementById('feedbackInput');
        const customPrefInput = document.getElementById('customPrefInput');
        
        if (basket.length === 0) {
            recipeCard.style.display = "block";
            regenBtn.style.display = "none";
            feedbackGroup.style.display = "none";
            outputDiv.innerHTML = `<p class="error-text">⚠️ Please add at least one ingredient first before generating a recipe!</p>`;
            recipeCard.scrollIntoView({ behavior: 'smooth' });
            return;
        }
        
        let finalPreference = selectedPreference;
        if (selectedPreference === 'Other') {
            finalPreference = customPrefInput.value.trim() || "Unique style";
        }

        const noteValue = feedbackInput.value.trim();

        recipeCard.style.display = "block";
        regenBtn.style.display = "none";
        feedbackGroup.style.display = "none"; 
        
        if (isRegenerate) {
            outputDiv.innerHTML = "<div class='loading'>🔄 Tailoring a brand new strategy based on your adjustments...</div>";
        } else {
            outputDiv.innerHTML = "<div class='loading'>⏳ Chef Angelo is cooking up your customized recipe...</div>";
        }
        
        recipeCard.scrollIntoView({ behavior: 'smooth' });

        try {
            const response = await fetch('/api/recipe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    ingredients: basket, 
                    isRegenerate,
                    preference: finalPreference,
                    notes: isRegenerate ? noteValue : "" 
                })
            });
            const data = await response.json();
            
            if (data.error) {
                outputDiv.innerHTML = `<p class="error-text">⚠️ Error: ${data.error}</p>`;
            } else {
                outputDiv.innerHTML = `<div class="recipe-content">${marked.parse(data.recipe)}</div>`;
                regenBtn.style.display = "block";
                feedbackGroup.style.display = "block"; 
                
                // Clear the adjustment input box after a successful auto-submit run
                if (isRegenerate) {
                    feedbackInput.value = "";
                }
            }
        } catch (error) {
            outputDiv.innerHTML = `<p class="error-text">⚠️ Connection Error. Check your terminal logs.</p>`;
        }
    }
</script>

</body>
</html>
